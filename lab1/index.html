<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lab 1 Bootstrap Grid</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
 background:#f4f7f6;
 font-family:sans-serif;
}

.grid-box{
 background:white;
 border:2px solid #dee2e6;
 border-radius:5px;
 padding:20px;
 text-align:center;
 margin-bottom:10px;
 font-weight:bold;
}
</style>

</head>

<body>

<header class="bg-primary text-white text-center p-4">
<h1>Bootstrap Responsive Grid</h1>
<p>Lab Experiment 1</p>
</header>

<main class="container mt-4">

<div class="row">

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 1</div>
</div>

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 2</div>
</div>

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 3</div>
</div>

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 4</div>
</div>

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 5</div>
</div>

<div class="col-12 col-md-6 col-lg-4">
<div class="grid-box">Card 6</div>
</div>

</div>

</main>

<footer class="text-center p-3 mt-4 text-muted">
Bootstrap Grid Layout Example
</footer>

</body>
</html>
